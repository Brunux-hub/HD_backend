server:
  port: ${PORT:8080}

spring:
  application:
    name: api_healthy_pet

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      # Mantener conexiones "calientes" evita el handshake TLS a Supabase en cada request.
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 10000
      keepalive-time: 30000
      max-lifetime: 1800000

  jpa:
    # Evita mantener la sesión de Hibernate abierta durante el render (lo advertía el log).
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    property-naming-strategy: SNAKE_CASE

jwt:
  secret: ${JWT_SECRET:Q2FtYmlhclBvclVuU2VjcmV0b1NlZ3Vyb0RlMzJCeXRlc01pbmltbw==}
  expiration: ${JWT_EXPIRATION:3600000}

app:
  cors:
    # OrÃ­genes del front permitidos (separados por coma). Ej: http://localhost:3000,https://miapp.com
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
