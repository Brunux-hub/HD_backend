spring:
  application:
    name: healthy-pets-api
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: healthy_pets_bd_2
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  error:
    include-message: never

jwt:
  secret: ${JWT_SECRET:Q2FtYmlhclBvclVuU2VjcmV0b1NlZ3Vyb0RlMzJCeXRlc01pbmltbw==}
  expiration: ${JWT_EXPIRATION:3600000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://TU-FRONTEND.vercel.app}
